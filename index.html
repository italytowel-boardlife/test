let selectedHand = [];
let selectedAfterlife = [];
let activeSearch = "";
let scoreConfirmed = false;
let activeSuit = 'all';
let dionysusBaseTargetId = '';
let helmetProtectedHeroId = '';
const ALL_TAGS = ["군주","민첩","완력","예술가","영악함","현명함","전사","우호적","적대적","물","신성","식물","마법"];

function cloneCardRef(id) { return cardsDatabase.find(c => c.id === id); }
function getSources(card, key) { return Array.isArray(card[key]) ? card[key] : []; }
function addSource(card, key, source) { card[key] = getSources(card,key); if(!card[key].includes(source)) card[key].push(source); }
function removeSource(card, key, source) { card[key] = getSources(card,key).filter(s => s !== source); }
function clearSource(source) {
  cardsDatabase.forEach(card => {
    // 태그 추가 효과는 addedTags에는 실제 태그명, addedTagSource에는 효과 출처가 저장됨.
    // 따라서 해제 시 출처에 해당하는 태그명을 찾아 addedTags에서도 함께 제거해야 함.
    if(card.addedTagSource && card.addedTagSource[source]) {
      const tagToRemove = card.addedTagSource[source];
      card.addedTags = getSources(card,'addedTags').filter(t => t !== tagToRemove);
      delete card.addedTagSource[source];
      if(Object.keys(card.addedTagSource).length === 0) delete card.addedTagSource;
    }

    // 제거/무효화 효과는 배열에 효과 출처명이 저장되어 있으므로 출처명으로 제거
    ['tagDisabledBy','bonusDisabledBy','penaltyDisabledBy'].forEach(key => removeSource(card,key,source));

    if(Array.isArray(card.addedTags) && card.addedTags.length === 0) delete card.addedTags;
    ['tagDisabledBy','bonusDisabledBy','penaltyDisabledBy'].forEach(key => {
      if(Array.isArray(card[key]) && card[key].length === 0) delete card[key];
    });
  });
  if(source === '디오니소스') dionysusBaseTargetId = '';
  if(source === '하데스의 투구') helmetProtectedHeroId = '';
}
function isTagDisabled(card) { return getSources(card,'tagDisabledBy').length>0; }
function isBonusDisabled(card) { return getSources(card,'bonusDisabledBy').length>0; }
function isPenaltyDisabled(card) { return getSources(card,'penaltyDisabledBy').length>0; }
function getEffectiveTags(card) {
  if(isTagDisabled(card)) return [];
  return [...new Set([...(card.tags||[]), ...getSources(card,'addedTags')])];
}
function cardHasTag(card, tag) { return getEffectiveTags(card).includes(tag); }
function renderEffectiveTags(card) {
  const tags = getEffectiveTags(card);
  const notes=[];
  if(getSources(card,'addedTags').length) notes.push(`<span style="color:#86efac;">추가: ${getSources(card,'addedTags').join(', ')}</span>`);
  if(isTagDisabled(card)) notes.push(`<span style="color:#fbbf24;">태그 제거: ${getSources(card,'tagDisabledBy').join(', ')}</span>`);
  if(isBonusDisabled(card)) notes.push(`<span style="color:#fbbf24;">보너스 제거: ${getSources(card,'bonusDisabledBy').join(', ')}</span>`);
  if(isPenaltyDisabled(card)) notes.push(`<span style="color:#fbbf24;">페널티 제거: ${getSources(card,'penaltyDisabledBy').join(', ')}</span>`);
  return `현재 태그: ${tags.length ? tags.join(', ') : '없음'}${notes.length ? '<br>'+notes.join(' / ') : ''}`;
}
function renderEffectiveTagsInline(card) {
  const tags = getEffectiveTags(card);
  const notes=[];
  if(getSources(card,'addedTags').length) notes.push(`추가: ${getSources(card,'addedTags').join(', ')}`);
  if(isTagDisabled(card)) notes.push(`태그 제거: ${getSources(card,'tagDisabledBy').join(', ')}`);
  if(isBonusDisabled(card)) notes.push(`보너스 제거: ${getSources(card,'bonusDisabledBy').join(', ')}`);
  if(isPenaltyDisabled(card)) notes.push(`페널티 제거: ${getSources(card,'penaltyDisabledBy').join(', ')}`);
  const tagText = `현재 태그: ${tags.length ? tags.join(', ') : '없음'}`;
  const noteText = notes.length ? ` <span class="state-note">(${notes.join(' / ')})</span>` : '';
  return `<span class="selected-inline-tags">${tagText}${noteText}</span>`;
}

function getEffectApplicationsBySource(sourceName) {
  const applications = [];
  cardsDatabase.forEach(target => {
    if(target.addedTagSource && target.addedTagSource[sourceName]) {
      applications.push(`${target.name}에 ${target.addedTagSource[sourceName]} 태그 추가`);
    }
    if(getSources(target,'tagDisabledBy').includes(sourceName)) {
      applications.push(`${target.name}의 태그 제거`);
    }
    if(getSources(target,'bonusDisabledBy').includes(sourceName)) {
      applications.push(`${target.name}의 보너스 제거`);
    }
    if(getSources(target,'penaltyDisabledBy').includes(sourceName)) {
      applications.push(`${target.name}의 페널티 제거`);
    }
  });
  if(sourceName === '디오니소스' && dionysusBaseTargetId) {
    const target = cloneCardRef(dionysusBaseTargetId);
    if(target) applications.push(`${target.name}의 기본점수 ${target.base}점 추가 대상으로 지정`);
  }
  if(sourceName === '하데스의 투구' && helmetProtectedHeroId) {
    const target = cloneCardRef(helmetProtectedHeroId);

}
function getCardAppliedStateNotes(card) {

  if(isTagDisabled(card)) notes.push(`태그 제거 적용됨: ${getSources(card,'tagDisabledBy').join(', ')}`);
  if(isBonusDisabled(card)) notes.push(`보너스 제거 적용됨: ${getSources(card,'bonusDisabledBy').join(', ')}`);
  if(isPenaltyDisabled(card)) notes.push(`페널티 제거 적용됨: ${getSources(card,'penaltyDisabledBy').join(', ')}`);

}
function renderAppliedEffectLine(row) {

function allCards() { return [...selectedHand, ...selectedAfterlife]; }

function isSelectedInAfterlife(card) { return selectedAfterlife.some(c=>c.id===card.id); }
function countTags(cards, tagName, ignoreId=null) { return cards.reduce((sum,c)=>sum + (c.id!==ignoreId && cardHasTag(c,tagName) ? 1 : 0),0); }
function hasTag(cards, tagName) { return countTags(cards, tagName)>0; }
function countSuit(cards, suitName, ignoreId=null) { return cards.filter(c=>c.suit===suitName && c.id!==ignoreId).length; }
function hasCard(cards, names) { return cards.some(c=>names.includes(c.name)); }
function escapeHtml(value) { return String(value ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
function formatSignedScore(v) { return v>0?`+${v}점`:v<0?`${v}점`:'0점'; }
function options(cards, selected='') { return cards.map(c=>`<option value="${c.id}" ${selected===c.id?'selected':''}>${escapeHtml(c.name)}(${suitLabels[c.suit]})</option>`).join(''); }
function tagOptions(tags, selected='') { return tags.map(t=>`<option value="${t}" ${selected===t?'selected':''}>${t}</option>`).join(''); }

function calcBonus(card,state) {
  if(isBonusDisabled(card)) return 0;
  const hand=state.hand, afterlife=state.afterlife, all=state.all, liveHeroes=state.liveHeroes;
  switch(card.id) {
    case "apollo": return countTags(all,"예술가",card.id)*5;
    case "ares": return countTags(all,"전사",card.id)*7;
    case "artemis": return all.filter(c=>c.suit==="monster"&&cardHasTag(c,"적대적")).length*7;
    case "athena": return liveHeroes.filter(h=>getEffectiveTags(h).some(t=>cardHasTag(card,t))).length*4;
    case "demeter": return countTags(all,"식물",card.id)*5;
    case "hades": return afterlife.filter(c=>c.id!==card.id).length*3;
    case "hecate": return countTags(all,"마법",card.id)*9;
    case "hephaestus": return countSuit(all,"item",card.id)*10;
    case "hera": return Math.floor(liveHeroes.length/2)*12;
    case "hermes": return (countSuit(all,"place")+liveHeroes.filter(h=>cardHasTag(h,"민첩")).length+afterlife.filter(c=>c.suit==="hero").length)*5;
    case "muse": return countTags(all,"예술가",card.id)*8;
    case "persephone": return Math.min(afterlife.length,countTags(all,"식물",card.id))*6;
    case "poseidon": return (countTags(all,"물",card.id)+countSuit(all,"monster"))*5;
    case "zeus": return (countSuit(all,"god",card.id)+countTags(all,"군주"))*4;
    case "dionysus": return dionysusBaseTargetId ? (cloneCardRef(dionysusBaseTargetId)?.base || 0) : 0;
    case "achilles": return hasCard(all,["아테나","헤라","포세이돈","스틱스강"])?5:0;
    case "andromeda": return all.some(c=>c.suit==="quest")&&all.some(c=>c.suit==="monster"&&cardHasTag(c,"적대적"))?17:0;
    case "arachne": return countSuit(all,"hero")>countSuit(all,"god")?10:0;
    case "hector": return hasCard(all,["아레스","아폴론","아르테미스"])?6:0;
    case "helen": return countTags(all,"전사")*10;
    case "heracles": return all.filter(c=>c.suit==="monster"&&cardHasTag(c,"적대적")).length*5;
    case "homer": return countTags(all,"전사")*6+countSuit(all,"quest")*6;
    case "jason": return countSuit(all,"quest")*4+Math.max(0,liveHeroes.length-1)*4;
    case "odysseus": return countTags(all,"물")*4;
    case "orpheus": return hand.some(c=>c.id==="orpheus")&&afterlife.length?Math.max(...afterlife.map(c=>c.base)):0;
    case "perseus": return (countSuit(all,"god")>0?5:0)+(countSuit(all,"item")>0?5:0);
    case "argo": return countTags(all,"물")*liveHeroes.length*5;
    case "golden_apple": return countSuit(all,"quest")>0?14:0;
    case "golden_fleece": return liveHeroes.length>0&&hasTag(all,"마법")?12:0;
    case "trojan_horse": return hasTag(all,"영악함")&&liveHeroes.length>=2?15:0;
    case "winged_sandals": return liveHeroes.length>0&&countSuit(all,"place")>=2?15:0;
    case "mount_olympus": return countSuit(all,"god")*6;
    case "palace": return (hasTag(all,"군주")?7:0)+countTags(all,"예술가")*7;
    case "garden_persephone": return all.filter(c=>c.suit==="item"&&cardHasTag(c,"식물")).length*4;
    case "river_styx": return countSuit(all,"god")>0&&liveHeroes.length>0?5:0;
    case "sacrificial_altar": return afterlife.filter(c=>c.suit==="hero").length*7;
    case "temple": return (countSuit(all,"god")>0?6:0)+countTags(all,"예술가")*6;
    case "labyrinth": return (all.some(c=>c.suit==="monster"&&cardHasTag(c,"적대적"))?10:0)+(liveHeroes.some(h=>cardHasTag(h,"영악함"))?10:0);
    case "cerberus": return afterlife.filter(c=>c.suit==="hero").length*5;
    case "pegasus": return liveHeroes.some(h=>cardHasTag(h,"예술가")&&cardHasTag(h,"민첩"))?10:0;
    case "twelve_labors": return liveHeroes.length?(countTags(all,"완력")+all.filter(c=>c.suit==="monster"&&cardHasTag(c,"적대적")).length)*12:0;
    case "apotheosis": return liveHeroes.length&&countSuit(all,"god")&&hasTag(all,"신성")&&hasTag(all,"마법")?28:0;
    case "eleusinian_mysteries": return liveHeroes.length&&hasTag(all,"식물")&&hasTag(all,"예술가")&&hasTag(all,"마법")?27:0;
    case "legendary_threat": return ["hero","god","place","monster","item"].every(s=>countSuit(all,s)>0)&&liveHeroes.length?30:0;
    case "glimpse_divinity": return liveHeroes.length?(countSuit(all,"god")+countTags(all,"신성"))*8:0;
    case "long_journey": return liveHeroes.length?countSuit(all,"place")*11:0;
    case "lost_knowledge": return liveHeroes.length?(countTags(all,"예술가")+countTags(all,"마법")+countTags(all,"현명함"))*7:0;
    case "olympic_games": return liveHeroes.length?liveHeroes.filter(h=>cardHasTag(h,"민첩")||cardHasTag(h,"완력")).length*11:0;
    case "resisting_kingdom": return liveHeroes.some(h=>cardHasTag(h,"군주"))&&hasTag(all,"현명함")?27:0;
    case "trojan_war": return liveHeroes.length?countTags(all,"전사")*13:0;
    case "visit_underworld": return liveHeroes.length?afterlife.length*6:0;
    default: return 0;
  }
}
function calcPenalty(card,state) {
  if(isPenaltyDisabled(card)) return 0;
  const all=state.all, liveHeroes=state.liveHeroes, inAfterlife=isSelectedInAfterlife(card);
  switch(card.id) {
    case "apple_of_discord": { let p=0; const gc=countSuit(all,"god"), hc=liveHeroes.length, mc=countSuit(all,"monster"); if(gc>1)p-=(gc-1)*5; if(hc>1)p-=(hc-1)*5; if(mc>1)p-=(mc-1)*5; return p; }
    case "garden_hesperides": return all.some(c=>c.suit==="monster"&&cardHasTag(c,"적대적"))?0:-12;
    case "river_lethe": return inAfterlife?0:-20;
    case "river_styx": return inAfterlife?0:-20;
    case "cerberus": return inAfterlife?0:-5;
    case "pegasus": return hasTag(all,"현명함")?0:-10;
    default: return 0;
  }
}
function getWarnings(state) {
  const hand=state.hand, afterlife=state.afterlife, live=state.liveHeroes, warnings=[];
  const selectedIds = new Set([...hand,...afterlife].map(c=>c.id));
  if(selectedIds.has('athena')) warnings.push('아테나: 필요하면 선택된 카드 목록에서 대상 영웅과 추가 태그를 지정하세요.');
  if(selectedIds.has('chiron')) warnings.push('케이론: 필요하면 선택된 카드 목록에서 대상 영웅과 추가 태그를 지정하세요.');
  if(selectedIds.has('winged_sandals')) warnings.push('날개 달린 샌들: 필요하면 선택된 카드 목록에서 민첩 태그를 추가할 영웅을 지정하세요.');
  if(selectedIds.has('dionysus')) warnings.push('디오니소스: 제거 대상과 기본점수 추가 대상을 선택했는지 확인하세요.');
  if(selectedIds.has('moly')) warnings.push('몰리: 제거할 페널티를 선택했는지 확인하세요.');
  if(selectedIds.has('magic_bridle')) warnings.push('마법 고삐: 제거할 몬스터 페널티를 선택했는지 확인하세요.');
  if(selectedIds.has('helmet_of_hades')) warnings.push('하데스의 투구: 몬스터 종료 효과 자동 반영 전 보호할 영웅을 지정하세요.');
  if(selectedIds.has('heracles') && hand.some(c=>c.id==='heracles')) warnings.push('헤라클레스: 게임 종료 시 다른 영웅 1명을 사후세계로 보내야 할 수 있습니다.');
  if(selectedIds.has('pomegranate')) warnings.push('석류: 게임 종료 시 손패의 신 1명을 사후세계로 보내야 할 수 있습니다.');
  if(selectedIds.has('sacrificial_altar')) warnings.push('희생제단: 사후세계로 보낸 영웅을 대체할 카드는 직접 추가해주세요.');
  const monsterIds=['antaeus','calydonian_boar','hydra','medusa','minotaur','scylla_charybdis','siren'];
  if(monsterIds.some(id=>selectedIds.has(id))) warnings.push('일부 몬스터는 조건 미충족 시 모든 영웅을 사후세계로 보냅니다. 해당 카드의 자동 반영 버튼을 확인하세요.');
  return warnings;
}

function renderCards() {
  const grid=document.getElementById('card-display-grid'); grid.innerHTML='';
  cardsDatabase.sort((a,b)=>suitOrder[a.suit]-suitOrder[b.suit] || a.name.localeCompare(b.name,'ko'));
  cardsDatabase.forEach(card=>{
    const el=document.createElement('div'); el.className='game-card'; el.dataset.suit=card.suit; el.dataset.id=card.id;
    el.innerHTML=`<div><div class="card-header"><div class="card-title-line"><span class="card-title">${escapeHtml(card.name)}</span><span class="card-suit suit-${card.suit}">(${suitLabels[card.suit]})</span><span class="card-tags">${(card.tags||[]).length?(card.tags||[]).map(t=>`<span class="tag-badge">${t}</span>`).join(''):'<span class="tag-badge">태그 없음</span>'}</span></div><span class="card-score-badge">${card.base}</span></div><div class="card-effect">${escapeHtml(card.effect)}</div></div><div class="card-actions"><button class="action-btn btn-hand" onclick="toggleHand('${card.id}')">손패</button><button class="action-btn btn-afterlife" onclick="toggleAfterlife('${card.id}')">사후세계</button></div>`;
    grid.appendChild(el);
  });
  setActiveSuit(activeSuit);
}
function updateCardButtons() { document.querySelectorAll('.game-card').forEach(el=>{ const id=el.dataset.id; el.querySelector('.btn-hand').classList.toggle('selected',selectedHand.some(c=>c.id===id)); el.querySelector('.btn-afterlife').classList.toggle('selected',selectedAfterlife.some(c=>c.id===id)); }); }
function toggleHand(id) { const card=cloneCardRef(id); if(selectedHand.some(c=>c.id===id)) selectedHand=selectedHand.filter(c=>c.id!==id); else { selectedHand.push(card); selectedAfterlife=selectedAfterlife.filter(c=>c.id!==id); } scoreConfirmed=false; updateCardButtons(); updateCalculator(); }
function toggleAfterlife(id) { const card=cloneCardRef(id); if(selectedAfterlife.some(c=>c.id===id)) selectedAfterlife=selectedAfterlife.filter(c=>c.id!==id); else { selectedAfterlife.push(card); selectedHand=selectedHand.filter(c=>c.id!==id); } scoreConfirmed=false; updateCardButtons(); updateCalculator(); }
function buildScoreData() {
  const state={hand:selectedHand, afterlife:selectedAfterlife, all:allCards(), liveHeroes:livingHeroes()};
  const baseScore=state.all.reduce((s,c)=>s+c.base,0); let bonusScore=0, penaltyScore=0;
  const effectRows=state.all.map(card=>{ const bonus=calcBonus(card,state); const penalty=calcPenalty(card,state); bonusScore+=bonus; penaltyScore+=penalty; return {card, zone:isSelectedInAfterlife(card)?'사후세계':'손패', bonus, penalty, effect:card.effect||'효과 없음.'}; });
  const afterlifePenalty=selectedAfterlife.length*-10; const manualScore=parseInt(document.getElementById('manual-adjust').value||'0',10); const finalScore=baseScore+bonusScore+penaltyScore+afterlifePenalty+manualScore; const warnings=getWarnings(state);
  return {state,baseScore,bonusScore,penaltyScore,afterlifePenalty,manualScore,finalScore,effectRows,warnings};
}
function updateCalculator() {
  const data=buildScoreData();
  document.getElementById('base-score').innerText=data.baseScore+'점'; document.getElementById('bonus-score').innerText=data.bonusScore+'점'; document.getElementById('penalty-score').innerText=data.penaltyScore+'점'; document.getElementById('afterlife-score').innerText=data.afterlifePenalty+'점'; document.getElementById('final-score').innerText=data.finalScore+'점';
  const summary=document.getElementById('selected-cards-summary');
  if(data.state.all.length===0) summary.innerHTML='<p style="color:var(--text-muted);font-style:italic;">선택된 카드가 없습니다.</p>';
  else {
    summary.innerHTML='';
    const renderSelected=(c,zone)=>{
      summary.innerHTML += `<div class="selected-item" onclick="focusCard('${c.id}')"><div><div class="selected-card-title-row"><span class="selected-card-name">${zone==='hand'?'✋':'💀'} ${escapeHtml(c.name)} <small class="selected-suit-label suit-${c.suit}">(${suitLabels[c.suit]})</small></span>${renderEffectiveTagsInline(c)}</div><div class="selected-card-score">${c.base}점${zone==='afterlife'?' / 사후세계 -10':''}</div><div class="selected-card-effect">${escapeHtml(c.effect)}</div></div><div class="selected-actions"><button class="selected-zone-btn ${zone==='hand'?'active-hand':''}" onclick="setCardZone(event,'${c.id}','hand')">손패</button><button class="selected-zone-btn ${zone==='afterlife'?'active-afterlife':''}" onclick="setCardZone(event,'${c.id}','afterlife')">사후세계</button></div>${renderSpecialEffectControls(c)}</div>`;
    };
    selectedHand.forEach(c=>renderSelected(c,'hand')); selectedAfterlife.forEach(c=>renderSelected(c,'afterlife'));
  }
  document.getElementById('warnings').innerHTML=data.warnings.map(w=>`<div>• ${escapeHtml(w)}</div>`).join('');
  if(scoreConfirmed) renderConfirmedScore(data);
}
function confirmScore() { scoreConfirmed=true; updateCalculator(); const box=document.getElementById('confirm-result'); if(box) box.scrollIntoView({behavior:'smooth',block:'nearest'}); }
function renderConfirmedScore(data) {
  const box=document.getElementById('confirm-result'); box.style.display='block';
  const handList=selectedHand.length?selectedHand.map(c=>`${escapeHtml(c.name)}(${suitLabels[c.suit]})`).join(', '):'없음';
  const afterList=selectedAfterlife.length?selectedAfterlife.map(c=>`${escapeHtml(c.name)}(${suitLabels[c.suit]})`).join(', '):'없음';
  const effectHtml=data.effectRows.filter(r=>{ const apps=getEffectApplicationsBySource(r.card.name); return r.bonus!==0||r.penalty!==0||apps.length||isTagDisabled(r.card)||isBonusDisabled(r.card)||isPenaltyDisabled(r.card)||getSources(r.card,'addedTags').length||r.effect.replace(/\s/g,'')!=='효과없음.'; }).map(r=>renderAppliedEffectLine(r)).join('') || '<div class="effect-line">적용될 카드 효과가 없습니다.</div>';
  const warningsHtml=data.warnings.length?data.warnings.map(w=>`<div>• ${escapeHtml(w)}</div>`).join(''):'<div>추가 확인이 필요한 효과가 없습니다.</div>';
  box.innerHTML=`<h3>✅ 확정 결과</h3><div><strong>손패:</strong> ${handList}</div><div><strong>사후세계:</strong> ${afterList}</div><div class="confirm-result-section"><div class="confirm-result-row"><span>기본 점수</span><strong>${data.baseScore}점</strong></div><div class="confirm-result-row"><span>보너스 점수</span><strong class="plus">${formatSignedScore(data.bonusScore)}</strong></div><div class="confirm-result-row"><span>페널티 감점</span><strong class="minus">${formatSignedScore(data.penaltyScore)}</strong></div><div class="confirm-result-row"><span>사후세계 감점</span><strong class="minus">${formatSignedScore(data.afterlifePenalty)}</strong></div><div class="confirm-result-row"><span>수동 보정</span><strong>${formatSignedScore(data.manualScore)}</strong></div><div class="confirm-result-row confirm-result-total"><span>최종 점수</span><span>${data.finalScore}점</span></div></div><div class="confirm-result-section"><strong>효과 적용 내역</strong>${effectHtml}</div><div class="confirm-result-section" style="color:#fca5a5;"><strong>확인 필요</strong>${warningsHtml}</div>`;
}
function filterSuit(event,suit) { activeSuit=suit; setActiveSuit(suit); }
function handleCardSearch() { activeSearch = (document.getElementById('card-search')?.value || '').trim().toLowerCase(); setActiveSuit(activeSuit); }
function clearCardSearch() { const input=document.getElementById('card-search'); if(input) input.value=''; activeSearch=''; setActiveSuit(activeSuit); }
function setActiveSuit(suit) {
  activeSuit=suit;
  document.querySelectorAll('.tab-btn').forEach(btn=>{ const m=btn.getAttribute('onclick')?.match(/'([^']+)'/); btn.classList.toggle('active',m&&m[1]===suit); });
  let visibleCount=0;
  document.querySelectorAll('.game-card').forEach(card=>{
    const cardData = cardsDatabase.find(c=>c.id===card.dataset.id);
    const suitMatch = suit==='all'||card.dataset.suit===suit;
    const searchMatch = !activeSearch || (cardData && cardData.name.toLowerCase().includes(activeSearch));
    const show = suitMatch && searchMatch;
    card.style.display = show ? 'flex' : 'none';
    if(show) visibleCount++;
  });
  const note=document.getElementById('search-result-note');
  if(note) note.textContent = activeSearch ? `검색 결과 ${visibleCount}장` : '';
}
function clearCardSelectionState(id) {
  const c = cardsDatabase.find(card => card.id === id);
  if(!c) return;
  delete c.addedTags;
  delete c.tagDisabledBy;
  delete c.bonusDisabledBy;
  delete c.penaltyDisabledBy;
  delete c.addedTagSource;
  if(dionysusBaseTargetId === id) dionysusBaseTargetId = '';
  if(helmetProtectedHeroId === id) helmetProtectedHeroId = '';
}
function setCardZone(event,id,zone) {
  event.stopPropagation();
  const isHand = selectedHand.some(c=>c.id===id);
  const isAfterlife = selectedAfterlife.some(c=>c.id===id);

  // 선택된 카드 목록에서 현재 적용된 버튼을 다시 누르면 목록에서 제거
  if((zone==='hand' && isHand) || (zone==='afterlife' && isAfterlife)) {
    selectedHand = selectedHand.filter(c=>c.id!==id);
    selectedAfterlife = selectedAfterlife.filter(c=>c.id!==id);
    clearCardSelectionState(id);
  } else if(zone==='hand') {
    if(!isHand) selectedHand.push(cloneCardRef(id));
    selectedAfterlife = selectedAfterlife.filter(c=>c.id!==id);
  } else {
    if(!isAfterlife) selectedAfterlife.push(cloneCardRef(id));
    selectedHand = selectedHand.filter(c=>c.id!==id);
  }
  scoreConfirmed=false;
  updateCardButtons();
  updateCalculator();
}
function resetSelection() { scoreConfirmed=false; selectedHand=[]; selectedAfterlife=[]; dionysusBaseTargetId=''; helmetProtectedHeroId=''; cardsDatabase.forEach(c=>{ delete c.addedTags; delete c.tagDisabledBy; delete c.bonusDisabledBy; delete c.penaltyDisabledBy; delete c.addedTagSource; }); document.getElementById('manual-adjust').value=0; const box=document.getElementById('confirm-result'); box.style.display='none'; box.innerHTML=''; updateCardButtons(); updateCalculator(); }
function focusCard(id) { const card=cloneCardRef(id); if(!card) return; setActiveSuit(card.suit); const el=document.querySelector(`.game-card[data-id="${id}"]`); if(!el) return; el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('focus-highlight'); setTimeout(()=>el.classList.remove('focus-highlight'),1600); }
renderCards(); updateCardButtons(); updateCalculator();
</script>
</body>
</html>
